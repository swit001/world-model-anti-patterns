<svg width="680" height="374" viewBox="0 0 680 374" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <rect width="680" height="374" fill="#FFFFFF"/>

  <!-- Column headers -->
  <text x="40" y="26" font-size="11" fill="#1E2549" opacity="0.45" font-weight="500">#</text>
  <text x="72" y="26" font-size="11" fill="#1E2549" opacity="0.45" font-weight="500">Anti-pattern</text>
  <text x="296" y="26" font-size="11" fill="#F7694C" opacity="0.85" font-weight="600">Bad smell</text>
  <text x="476" y="26" font-size="11" fill="#26C981" opacity="0.9" font-weight="600">ESTC fix</text>
  <line x1="32" y1="34" x2="648" y2="34" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>

  <!-- Row 1 -->
  <rect x="32" y="42" width="616" height="56" rx="6" fill="#F2F2EA" stroke="#D8D8D0" stroke-width="0.5"/>
  <text x="50" y="74" font-size="11" fill="#1E2549" opacity="0.35" font-weight="600" dominant-baseline="central">01</text>
  <text x="72" y="62" font-size="13" font-weight="600" fill="#161D30" dominant-baseline="central">State as text</text>
  <text x="72" y="80" font-size="12" fill="#1E2549" opacity="0.65" dominant-baseline="central">"Order seems delivered…"</text>
  <line x1="284" y1="46" x2="284" y2="94" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="296" y="74" font-size="12" fill="#1E2549" dominant-baseline="central">Status lives in prompt</text>
  <line x1="464" y1="46" x2="464" y2="94" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="476" y="74" font-size="13" font-weight="600" fill="#1A7A4A" dominant-baseline="central">Entity + committed State</text>

  <!-- Row 2 -->
  <rect x="32" y="106" width="616" height="56" rx="6" fill="#F2F2EA" stroke="#D8D8D0" stroke-width="0.5"/>
  <text x="50" y="138" font-size="11" fill="#1E2549" opacity="0.35" font-weight="600" dominant-baseline="central">02</text>
  <text x="72" y="126" font-size="13" font-weight="600" fill="#161D30" dominant-baseline="central">Transition-less action</text>
  <text x="72" y="144" font-size="12" fill="#1E2549" opacity="0.65" dominant-baseline="central">refundPayment() fires directly</text>
  <line x1="284" y1="110" x2="284" y2="158" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="296" y="138" font-size="12" fill="#1E2549" dominant-baseline="central">No from/to state declared</text>
  <line x1="464" y1="110" x2="464" y2="158" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="476" y="138" font-size="13" font-weight="600" fill="#1A7A4A" dominant-baseline="central">Declared Transition</text>

  <!-- Row 3 -->
  <rect x="32" y="170" width="616" height="56" rx="6" fill="#F2F2EA" stroke="#D8D8D0" stroke-width="0.5"/>
  <text x="50" y="202" font-size="11" fill="#1E2549" opacity="0.35" font-weight="600" dominant-baseline="central">03</text>
  <text x="72" y="190" font-size="13" font-weight="600" fill="#161D30" dominant-baseline="central">Guard as prompt</text>
  <text x="72" y="208" font-size="12" fill="#1E2549" opacity="0.65" dominant-baseline="central">"Never refund after 7 days"</text>
  <line x1="284" y1="174" x2="284" y2="222" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="296" y="202" font-size="12" fill="#1E2549" dominant-baseline="central">Policy in system prompt</text>
  <line x1="464" y1="174" x2="464" y2="222" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="476" y="202" font-size="13" font-weight="600" fill="#1A7A4A" dominant-baseline="central">Executable Constraint</text>

  <!-- Row 4 -->
  <rect x="32" y="234" width="616" height="56" rx="6" fill="#F2F2EA" stroke="#D8D8D0" stroke-width="0.5"/>
  <text x="50" y="266" font-size="11" fill="#1E2549" opacity="0.35" font-weight="600" dominant-baseline="central">04</text>
  <text x="72" y="254" font-size="13" font-weight="600" fill="#161D30" dominant-baseline="central">Belief-commit confusion</text>
  <text x="72" y="272" font-size="12" fill="#1E2549" opacity="0.65" dominant-baseline="central">LLM belief treated as SSOT</text>
  <line x1="284" y1="238" x2="284" y2="286" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
