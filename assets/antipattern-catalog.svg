  <line x1="464" y1="238" x2="464" y2="286" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="476" y="256" font-size="13" font-weight="600" fill="#1A7A4A" dominant-baseline="central">NWM belief</text>
  <text x="476" y="274" font-size="13" font-weight="600" fill="#1A7A4A" dominant-baseline="central">→ SWM commit</text>

  <!-- Row 5 -->
  <rect x="32" y="298" width="616" height="56" rx="6" fill="#F2F2EA" stroke="#D8D8D0" stroke-width="0.5"/>
  <text x="50" y="330" font-size="11" fill="#1E2549" opacity="0.35" font-weight="600" dominant-baseline="central">05</text>
  <text x="72" y="318" font-size="13" font-weight="600" fill="#161D30" dominant-baseline="central">No verdict contract</text>
  <text x="72" y="336" font-size="12" fill="#1E2549" opacity="0.65" dominant-baseline="central">Agent returns "Done" or prose</text>
  <line x1="284" y1="302" x2="284" y2="350" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="296" y="330" font-size="12" fill="#1E2549" dominant-baseline="central">No structured outcome</text>
  <line x1="464" y1="302" x2="464" y2="350" stroke="#1E2549" stroke-width="0.5" opacity="0.15"/>
  <text x="476" y="330" font-size="13" font-weight="600" fill="#1A7A4A" dominant-baseline="central">VerdictOutcome contract</text>
